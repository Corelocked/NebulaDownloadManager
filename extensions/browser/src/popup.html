<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NebulaDM</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <h1>NebulaDM</h1>
      <p class="subtitle">Browser bridge for the local Rust desktop app.</p>

      <section id="videoPanel" class="videoPanel" hidden>
        <p class="sectionLabel">Current Video</p>
        <p id="videoTitle" class="videoTitle">No active video detected.</p>
        <p id="videoSource" class="videoSource"></p>
        <div class="videoActions">
          <button id="downloadVideoButton" type="button">Download Video</button>
          <button id="queueVideoButton" type="button" class="secondaryButton">Queue Only</button>
        </div>
      </section>

      <label class="field">
        <span>Bridge URL</span>
        <input id="bridgeUrl" type="text" spellcheck="false">
      </label>

      <label class="toggle">
        <input id="captureEnabled" type="checkbox">
        <span>Capture downloads automatically</span>
      </label>

      <label class="toggle">
        <input id="sendReferrer" type="checkbox">
        <span>Include referrer URL</span>
      </label>

      <label class="toggle">
        <input id="sendUserAgent" type="checkbox">
        <span>Include browser user agent</span>
      </label>

      <label class="toggle">
        <input id="sendCookies" type="checkbox">
        <span>Include cookies for authenticated downloads</span>
      </label>

      <button id="enableCookiesButton" type="button" class="secondaryButton">Enable YouTube Cookies</button>

      <p class="privacyNote">
        Privacy-first mode is on by default. NebulaDM only forwards extra browser metadata if you explicitly enable it here.
      </p>

      <button id="saveButton" type="button">Save Settings</button>
      <p id="statusText" class="status">Ready</p>
    </main>

    <script src="popup.js"></script>
  </body>
  </html>
